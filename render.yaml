services:
  - type: web
    name: camino-blog
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: camino-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AUTHOR_PASSWORD
        sync: false # set this in the Render dashboard - the password the authors will type
      - key: SITE_URL
        sync: false # e.g. https://camino-blog.onrender.com (used in notification emails)
      - key: GMAIL_USER
        sync: false # gmail address to send notifications from
      - key: GMAIL_APP_PASSWORD
        sync: false # gmail app password (Google Account - Security - App passwords)
      - key: RESEND_API_KEY
        sync: false # alternative provider - from resend.com (used only if Gmail vars unset)
      - key: FROM_EMAIL
        sync: false # optional - verified Resend sender, e.g. "Camino Blog <camino@yourdomain.com>"

databases:
  - name: camino-db
    plan: basic-256mb
