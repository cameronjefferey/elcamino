<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header"></header>
  <main class="container wide" style="padding-top: 24px;">
    <h1 style="text-align:center;">The Route</h1>
    <p class="center" id="route-desc" style="color:var(--ink-soft);"></p>

    <div class="card" id="progress-card" style="display:none;">
      <div id="progress-label" style="font-weight:800; font-size:18px;"></div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
      <div id="progress-sub" style="color:var(--ink-soft); font-size:15px;"></div>
    </div>

    <div class="card weather-card" id="weather-card" style="display:none;"></div>

    <div id="map"></div>

    <div class="card">
      <h2 style="margin-top:0;">Towns along the way</h2>
      <ul class="town-list" id="town-list"></ul>
    </div>
  </main>
  <footer class="site-footer"></footer>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/map.js"></script>
</body>
</html>
