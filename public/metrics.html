<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Metrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header"></header>
  <main class="container wide" style="padding-top: 24px;">
    <h1 style="text-align:center;">The Numbers</h1>
    <p class="center" style="color:var(--ink-soft); margin-top:-6px;">Dad’s daily stats from the trail</p>

    <div class="center">
      <div class="unit-toggle" id="unit-toggle">
        <button data-u="mi">miles</button>
        <button data-u="km">km</button>
      </div>
    </div>

    <div id="summary"></div>
    <div id="charts"></div>
    <div id="table"></div>
  </main>
  <footer class="site-footer"></footer>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/metrics.js"></script>
</body>
</html>
